name: ci

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install repository validation tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black bandit detect-secrets

      - name: Run ruff
        run: ruff check .

      - name: Run black check
        run: black --check .

      - name: Run bandit
        run: bandit -q -r .

      - name: Run detect-secrets
        run: detect-secrets scan --all-files
