name: ci

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install repository validation tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black bandit detect-secrets

      - name: Run ruff
        run: ruff check .

      - name: Run black check
        # Ensure the tools directory (used for repository validation helpers) is excluded
        # to match the repo's pyproject configuration. This keeps black's checks for
        # the codebase while not forcing formatting of the validation helper script.
        run: black --check . --exclude '/(notebooks|\\.git|\\.venv|venv|build|dist|tools)/'

      - name: Run bandit
        # Exclude common generated or support directories (including tools) from bandit
        # so that bandit focuses on the project's production code rather than helper
        # validation scripts that intentionally use subprocess/chmod, etc.
        run: bandit -q -r . -x tests,notebooks,.venv,venv,build,dist,tools

      - name: Run detect-secrets
        run: detect-secrets scan --all-files
